<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파트너사 종합평가 대시보드</title>
<link rel="stylesheet" href="style.css?v=1.6.0">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark">SDI · SCM</span>
    <h1>파트너사 종합평가 대시보드</h1>
    <span class="sub">2024 – 2025</span>
  </div>
  <div class="tabs">
    <span class="version-badge" id="version-badge">v1.6.0</span>
    <button class="tab-btn active" data-view="dashboard">종합평가 결과</button>
    <button class="tab-btn" data-view="criteria">3사 평가기준 비교</button>
  </div>
</div>

<div class="page">

  <!-- ===================== VIEW 1: DASHBOARD ===================== -->
  <div class="view active" id="view-dashboard">

    <div class="toolbar">
      <div class="filter-group">
        <span class="filter-label">연도</span>
        <div class="chip-set" id="filter-year"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">사업부</span>
        <div class="chip-set" id="filter-division"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">최종등급</span>
        <div class="chip-set" id="filter-grade"></div>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="파트너사명 / 밴더코드 검색">
      </div>
    </div>

    <div class="kpi-row" id="kpi-row"></div>

    <div class="grid-2">
      <div class="panel">
        <h2>최종등급 분포 <span class="count-badge" id="grade-chart-count"></span></h2>
        <div class="chart-wrap"><canvas id="chart-grade"></canvas></div>
      </div>
      <div class="panel">
        <h2>SRS 등급 분포</h2>
        <div class="chart-wrap donut"><canvas id="chart-srs"></canvas></div>
      </div>
    </div>

    <div class="table-panel">
      <div class="table-head">
        <h2>파트너사 목록</h2>
        <span class="pager" id="table-summary" style="padding:0;"></span>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th data-key="partner">파트너사명</th>
            <th data-key="vendorCode">밴더코드</th>
            <th data-key="division">사업부</th>
            <th data-key="item">주거래품목</th>
            <th data-key="finalGrade">최종등급</th>
            <th data-key="subGrade">상세등급</th>
            <th data-key="perfGrade">성과등급</th>
            <th data-key="score">평가점수</th>
            <th data-key="srsGrade">SRS등급</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <div class="pager" id="pager"></div>
    </div>

  </div>

  <!-- ===================== VIEW 2: CRITERIA ===================== -->
  <div class="view" id="view-criteria">
    <div class="matrix-wrap">
      <table class="matrix" id="criteria-matrix"></table>
      <p class="matrix-note">각 셀은 해당 관계사가 그 평가영역에서 실제 사용하는 세부 평가지표입니다. 우측 상단 숫자는 지표 개수입니다. (출처: 관계사_종합평가_비교_대시보드.xlsm · 모판 시트)</p>
    </div>
  </div>

  <footer class="site-footer">파트너사 종합평가 결과정리 · 사내 배포용 정적 대시보드</footer>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <h3 id="drawer-title">-</h3>
      <div class="vc" id="drawer-vc">-</div>
    </div>
    <button class="drawer-close" id="drawer-close">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="data.js?v=1.6.0"></script>
<script src="script.js?v=1.6.0"></script>
</body>
</html>
